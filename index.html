<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>TrustWash Registration Form</title>
        <link rel="stylesheet" href="style.css"
    </head>
    <body>
        
        <h1>Customer's Registration</h1>
       
            <div>
            <label> Name:</label><input type="text" id="full-name" name="full-name" required>
            <br><br>
            </div>
            <div>
            
                <div class="form-group">
                            <label for="phone">Phone Number:</label>
                            <input type="tel" id="phone" name="phone required">
                            <br><br>
            </div>
               

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email required">
                <br><br>
            </div>


<label for="dressType" >Type of Clothes:</label>
        <select id="dressType" onchange="showOptions()" required>
            <option value="">-- Select Type --</option>
            <option value="english">English Dress</option>
            <option value="native">Native Dress</option>
        </select>



<br><br>

<div id="englishOptions" class="hidden">
            <label for="englishSelect">Select English Dress</label>



            <select id="englishSelect" name="englishDress">
                <option value="shirt_trouser">Shirt and Trouser</option>
                <option value="skirt_blouse">Skirt and Blouse</option>
                <option value="suit">Suit</option>
            </select>
        </div>
<br>


<div id="englishOptions" class="hidden">
            <label for="nativeSelect">Select Native Dress</label>

            <select id="nativeSelect" name="nativeSelect">
                <option value="pure_ankara">Pure Ankara</option>
                <option value="kampala">Kampala</option>
                <option value="adire">Adire</option>
            </select>
        </div>
        <br><br<



            
                <div>
            <label>Date:</label>
                <input type="date" id="date" name="date" required>
                <br><br>
            </div>
            <br>
            <button type="submit"class="submit-btn">Submit</button>
            
            </form>
        </div>
            
    </body>
    </html>
